<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PREMIUM-SU • Choose Your Plan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-12px) scale(1.03); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
    .duration-btn { transition: all 0.3s; }
    .duration-btn.active { background-color: #22c55e; color: white; transform: scale(1.1); }
    .price { transition: all 0.5s; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="bg-black/80 backdrop-blur-md sticky top-0 z-50 border-b border-zinc-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="text-2xl font-bold text-green-500">PREMIUM<span class="text-white">SU</span></div>
      <div class="flex gap-8 text-sm font-medium">
        <a href="#" class="hover:text-green-400 transition">Home</a>
        <a href="#" class="hover:text-green-400 transition">Features</a>
        <a href="#" class="hover:text-green-400 transition">Pricing</a>
        <a href="#" class="hover:text-green-400 transition">FAQ</a>
        <a href="#" class="hover:text-green-400 transition">Contact</a>
      </div>
      <button onclick="window.location.reload()" 
              class="bg-green-500 hover:bg-green-600 px-6 py-2 rounded-full font-semibold transition">
        Get Started
      </button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-16">
    <h1 class="text-5xl font-bold text-center mb-4">Choose Your Premium Experience</h1>
    <p class="text-center text-zinc-400 mb-12 text-xl">Unlock exclusive content, early access &amp; more</p>

    <!-- Duration Selector -->
    <div class="flex justify-center mb-12">
      <div class="bg-zinc-900 p-2 rounded-2xl flex gap-2 shadow-xl">
        <button onclick="selectDuration(1)" class="duration-btn active px-8 py-3 rounded-xl text-sm font-semibold" id="btn1">1 Month</button>
        <button onclick="selectDuration(3)" class="duration-btn px-8 py-3 rounded-xl text-sm font-semibold" id="btn3">3 Months</button>
        <button onclick="selectDuration(6)" class="duration-btn px-8 py-3 rounded-xl text-sm font-semibold" id="btn6">6 Months</button>
        <button onclick="selectDuration(12)" class="duration-btn px-8 py-3 rounded-xl text-sm font-semibold" id="btn12">12 Months</button>
      </div>
    </div>

    <!-- Pricing Cards -->
    <div class="grid md:grid-cols-4 gap-8" id="pricing-cards">
      <!-- Cards will be populated by JS -->
    </div>
  </div>

  <script>
    const plans = [
      { name: "Basic", price1: 2500, price3: 7000, price6: 12000, price12: 20000, color: "zinc" },
      { name: "Standard", price1: 5000, price3: 13500, price6: 25000, price12: 45000, color: "emerald" },
      { name: "Premium", price1: 8000, price3: 22000, price6: 40000, price12: 70000, color: "violet" },
      { name: "VIP", price1: 15000, price3: 40000, price6: 75000, price12: 130000, color: "amber" }
    ];

    let currentDuration = 1;

    function selectDuration(months) {
      currentDuration = months;
      document.querySelectorAll('.duration-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`btn${months}`).classList.add('active');
      renderCards();
    }

    function renderCards() {
      const container = document.getElementById('pricing-cards');
      container.innerHTML = '';

      plans.forEach(plan => {
        let price = plan[`price${currentDuration}`];
        const card = `
          <div class="card bg-zinc-900 border border-zinc-800 rounded-3xl p-8 hover:border-green-500 group">
            <h3 class="text-2xl font-bold mb-2">${plan.name}</h3>
            <div class="price text-5xl font-bold text-green-400 mb-8" id="price-${plan.name}">
              ₦${price.toLocaleString()}
            </div>
            <ul class="space-y-4 mb-10 text-sm">
              <li class="flex items-center gap-3"><i class="fa-solid fa-check text-green-500"></i> Full access to content</li>
              <li class="flex items-center gap-3"><i class="fa-solid fa-check text-green-500"></i> Priority support</li>
              <li class="flex items-center gap-3"><i class="fa-solid fa-check text-green-500"></i> Exclusive community</li>
              ${plan.name === "VIP" ? `<li class="flex items-center gap-3"><i class="fa-solid fa-check text-green-500"></i> 1-on-1 mentorship</li>` : ''}
            </ul>
            <button onclick="selectPlan('${plan.name}', ${price})"
                    class="w-full bg-white text-black font-semibold py-4 rounded-2xl hover:bg-green-500 hover:text-white transition-all duration-300">
              Choose ${plan.name}
            </button>
            <p class="text-center text-xs text-zinc-500 mt-4">Billed every ${currentDuration} month${currentDuration > 1 ? 's' : ''}</p>
          </div>
        `;
        container.innerHTML += card;
      });
    }

    function selectPlan(name, price) {
      alert(`✅ You selected ${name} plan for ₦${price.toLocaleString()} (${currentDuration} month${currentDuration > 1 ? 's' : ''})`);
      // Here you can later connect to payment (Flutterwave, Paystack, etc.)
    }

    // Initial render
    renderCards();
  </script>
</body>
</html>
